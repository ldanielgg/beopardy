<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beopardy</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>
    <header>
        <nav class="nav-bar">
            <img src="assets/title.png" alt="Beopardy Logo" class="logo">
            <div class="links">

                <a href="leaderboard.html">About</a>
                <a href="logout.html">Contact</a>

        <div class="setup-box">
            <img src="assets/title.png" alt="Beopardy Logo" class="main-image">

                <input type="number" id="playerCount" min="1" max="4" placeholder="Number of players" class="input-field">
